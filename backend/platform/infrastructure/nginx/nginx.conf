events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Optional performance tweaks
    sendfile        on;
    keepalive_timeout  65;

    # Upstreams mapping to Docker Compose service names
    upstream frontend_app {
        server saas_frontend:3000;
    }

    upstream admin_app {
        server saas_admin:3001;
    }

    upstream backend_api {
        server saas_backend:4000;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. API Routing
        location /api/ {
            # Strip /api/ before forwarding to backend if necessary, or let backend handle it
            proxy_pass http://backend_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. Admin Portal Routing
        location /admin {
            proxy_pass http://admin_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }



        # 3. Public Frontend Routing (Catch-all)
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}

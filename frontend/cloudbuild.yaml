# Cloud Build — build and deploy web to Cloud Run
#
# Admin is a separate repository.
#
# One-time setup: see docs/DEPLOYMENT-GCP.md
#
# Manual trigger:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_BACKEND_URL=https://api.example.com,_SITE_URL=https://www.example.com,_ADMIN_URL=https://admin.example.com

substitutions:
  _REGION: us-central1
  _REPOSITORY: system-db-frontend
  _WEB_SERVICE: system-db-web
  _BACKEND_URL: http://localhost:8000
  _SITE_URL: http://localhost:3000
  _ADMIN_URL: http://localhost:3001
  _APP_NAME: System DB

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-web
    args:
      - build
      - --target=runner
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:latest
      - --build-arg
      - APP_DIR=web
      - --build-arg
      - FILTER_PACKAGE=system-db
      - --build-arg
      - PORT=3000
      - --build-arg
      - NEXT_PUBLIC_BACKEND_URL=${_BACKEND_URL}
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=${_SITE_URL}
      - --build-arg
      - NEXT_PUBLIC_ADMIN_URL=${_ADMIN_URL}
      - --build-arg
      - NEXT_PUBLIC_APP_NAME=${_APP_NAME}
      - --build-arg
      - NEXT_PUBLIC_APP_ENV=production
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-web
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web
    waitFor: [build-web]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-web
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEB_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=20
      - --concurrency=80
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1
    waitFor: [push-web]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:latest

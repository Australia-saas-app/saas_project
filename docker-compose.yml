version: '3.8'

services:
  # ==========================================
  # 1. API GATEWAY / NGINX PROXY
  # ==========================================
  nginx:
    build:
      context: ./backend/platform/infrastructure/nginx
      dockerfile: Dockerfile
    container_name: saas_nginx
    ports:
      - "80:80"
    depends_on:
      - saas_frontend
      - saas_admin
      - saas_backend
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 2. FRONTEND (Public App)
  # ==========================================
  saas_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    environment:
      - NODE_ENV=production
      # Next.js will use this public URL for API calls
      - NEXT_PUBLIC_API_URL=http://localhost/api
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 3. ADMIN PORTAL (Private App)
  # ==========================================
  saas_admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: saas_admin
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 4. BACKEND CORE (NestJS)
  # ==========================================
  saas_backend:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: saas_backend
    environment:
      - NODE_ENV=production
      - DB_HOST=saas_postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=saas_db
    depends_on:
      - saas_postgres
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 5. DATABASE & INFRASTRUCTURE
  # ==========================================
  saas_postgres:
    image: postgres:15-alpine
    container_name: saas_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432" # Exposed for manual PGAdmin access if needed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - saas_network

  saas_mongodb:
    image: mongo:7
    container_name: saas_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - saas_network

  saas_redis:
    image: redis:7-alpine
    container_name: saas_redis
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - saas_network

  saas_zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: saas_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always
    networks:
      - saas_network

  saas_kafka:
    image: confluentinc/cp-kafka:latest
    container_name: saas_kafka
    depends_on:
      - saas_zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: saas_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://saas_kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    networks:
      - saas_network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  saas_network:
    driver: bridge

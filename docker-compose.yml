version: '3.8'

services:

  # ==========================================
  # 1. API GATEWAY (Kong DB-less)
  # ==========================================
  kong:
    image: kong:3.5
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8002:8001" # Admin API exposed on 8002 to avoid conflict with saas-admin on 8001
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 2. FRONTEND (Public App)
  # ==========================================
  saas-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://kong:8000
    container_name: saas-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://kong:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kong
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 3. ADMIN PORTAL (Private App)
  # ==========================================
  saas-admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://kong:8000
    container_name: saas-admin
    ports:
      - "8001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://kong:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kong
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 4. BACKEND MICROSERVICES (Internal)
  # ==========================================
  saas-backend-sso:
    build:
      context: ./backend/apps/sso
      dockerfile: Dockerfile
    container_name: saas-backend-sso
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=saas-postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=saas_db
      - REDIS_HOST=saas-redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://saas-redis:6379
      - SSO_SYNCHRONIZE=true
      - SMTP_USER=abdulrafiumahesar@gmail.com
      - SMTP_PASSWORD=kkzdajqzqvwkybgq
      - SMTP_FROM_EMAIL=abdulrafiumahesar@gmail.com
    depends_on:
      - saas-postgres
      - saas-redis
    restart: always
    networks:
      - saas_network

  saas-backend-admin:
    build:
      context: ./backend/apps/admin
      dockerfile: Dockerfile
    container_name: saas-backend-admin
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=saas-postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=saas_db
    depends_on:
      - saas-postgres
      - saas-backend-sso
    restart: always
    networks:
      - saas_network

  saas-backend-platform:
    build:
      context: ./backend/apps/platform
      dockerfile: Dockerfile
    container_name: saas-backend-platform
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DB_HOST=saas-postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=saas_db
    depends_on:
      - saas-postgres
      - saas-backend-sso
    restart: always
    networks:
      - saas_network

  # ==========================================
  # 5. DATABASE & INFRASTRUCTURE
  # ==========================================
  saas-postgres:
    image: postgres:15-alpine
    container_name: saas-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: saas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - saas_network

  saas_mongodb:
    image: mongo:7
    container_name: saas_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - saas_network

  saas-redis:
    image: redis:7-alpine
    container_name: saas-redis
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - saas_network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  saas_network:
    driver: bridge
